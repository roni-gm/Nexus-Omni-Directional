slam_toolbox:
  ros__parameters:

    use_sim_time: true

    # 🔥 FRAME (WAJIB)
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    # 🔥 SENSOR
    scan_topic: /scan

    # 🔥 MAP QUALITY
    resolution: 0.05
    max_laser_range: 8.0

    # 🔥 STABILITAS
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1

    # 🔥 OPTIONAL (bagus banget)
    transform_publish_period: 0.05
    map_update_interval: 2.0