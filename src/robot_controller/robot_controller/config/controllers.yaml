controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_drive_controller:
  ros__parameters:
    front_left_wheel_command_joint_name: wheel1_joint
    front_right_wheel_command_joint_name: wheel2_joint
    rear_left_wheel_command_joint_name: wheel3_joint
    rear_right_wheel_command_joint_name: wheel4_joint

    wheel_radius: 0.033
    wheel_separation_x: 0.0
    wheel_separation_y: 0.0

    reference_timeout: 0.9
    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true